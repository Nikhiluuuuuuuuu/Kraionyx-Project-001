global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'api-gateway'
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['api-gateway:8443']

  - job_name: 'fhir-adapter'
    static_configs:
      - targets: ['fhir-adapter:9090']

  - job_name: 'stt-engine'
    static_configs:
      - targets: ['stt-engine:8001']

  - job_name: 'clinical-nlp'
    static_configs:
      - targets: ['clinical-nlp:8002']
