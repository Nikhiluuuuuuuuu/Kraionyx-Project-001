version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: kraionyx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: kraionyx-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: kraionyx-jaeger
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: kraionyx-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "8889:8889" # Prometheus metrics exporter
    depends_on:
      - jaeger
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    external: true
    name: kraionyx-backend

volumes:
  prometheus-data:
    driver: local
    name: kraionyx-prometheus-data
  grafana-data:
    driver: local
    name: kraionyx-grafana-data
