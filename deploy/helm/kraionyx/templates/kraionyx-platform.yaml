apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: default
spec:
  mtls:
    mode: STRICT

---
# api-gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kraionyx.fullname" . }}-api-gateway
  labels:
    app: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "kraionyx-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/kraionyx/api-gateway"
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "secret/data/kraionyx/api-gateway" -}}`}}
          {{`{{ range $k, $v := .Data.data }}`}}
          export {{`{{ $k }}`}}={{`{{ $v }}`}}
          {{`{{ end }}`}}
          {{`{{- end -}}`}}
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.apiGateway.image }}"
          ports:
            - containerPort: {{ .Values.apiGateway.port }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kraionyx.fullname" . }}-api-gateway
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.apiGateway.port }}
      targetPort: {{ .Values.apiGateway.port }}
      protocol: TCP
      name: http
  selector:
    app: api-gateway

