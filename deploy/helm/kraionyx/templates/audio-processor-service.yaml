apiVersion: v1
kind: Service
metadata:
  name: {{ include "kraionyx.fullname" . }}-audio-processor
  labels:
    app.kubernetes.io/name: audio-processor
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.audioProcessor.service.type }}
  ports:
    - port: {{ .Values.audioProcessor.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: audio-processor
    app.kubernetes.io/instance: {{ .Release.Name }}
