apiVersion: v1
kind: Service
metadata:
  name: {{ include "svaani.fullname" . }}-fhir-adapter
  labels:
    app.kubernetes.io/name: fhir-adapter
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.fhirAdapter.service.type }}
  ports:
    - port: {{ .Values.fhirAdapter.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: fhir-adapter
    app.kubernetes.io/instance: {{ .Release.Name }}
