apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "svaani.fullname" . }}-stt-engine
  labels:
    app.kubernetes.io/name: stt-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.sttEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: stt-engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stt-engine
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: stt-engine
          image: "{{ .Values.sttEngine.image.repository }}:{{ .Values.sttEngine.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.sttEngine.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.sttEngine.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.sttEngine.resources | nindent 12 }}
