apiVersion: v1
kind: Service
metadata:
  name: {{ include "svaani.fullname" . }}-clinical-nlp
  labels:
    app.kubernetes.io/name: clinical-nlp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.clinicalNlp.service.type }}
  ports:
    - port: {{ .Values.clinicalNlp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: clinical-nlp
    app.kubernetes.io/instance: {{ .Release.Name }}
