name: Kraionyx CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  go-services:
    name: Build, Lint, Test & Scan (Go)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, fhir-adapter]
    
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/${{ matrix.service }}
          args: --timeout=5m

      - name: Run gosec (Security Scanner)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude-dir=tests ./...

      - name: Run Tests
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum -- -coverprofile=coverage.out ./...
          coverage=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
          awk -v cov="$coverage" 'BEGIN { if (cov < 80.0) { print "Coverage " cov "% is below 80.0%"; exit 1 } }'

  python-services:
    name: Build, Lint, Test & Scan (Python)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [clinical-nlp, stt-engine, audio-processor]
    
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install flake8 pytest pytest-cov bandit black isort

      - name: Run Black (Formatter Check)
        run: black --check .

      - name: Run Isort (Imports Check)
        run: isort --check-only .

      - name: Run Flake8 (Linting)
        run: flake8 . --max-line-length=100

      - name: Run Bandit (Security Scanner)
        run: bandit -r . -lll

      - name: Run Tests
        env:
          SARVAM_API_KEY: dummy_key_for_ci
        run: pytest -v --cov=. --cov-fail-under=80

  docker-build-and-scan:
    name: Build and Scan Docker Images
    needs: [go-services, python-services]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, fhir-adapter, audio-processor, clinical-nlp, stt-engine]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          load: true
          tags: kraionyx/${{ matrix.service }}:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kraionyx/${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kraionyx/${{ matrix.service }}:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom-${{ matrix.service }}.json'

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.json
