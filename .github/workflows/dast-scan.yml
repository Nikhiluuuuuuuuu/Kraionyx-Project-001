name: Automated DAST Scan (OWASP ZAP)

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday
  workflow_dispatch: # Allow manual trigger

jobs:
  zap_scan:
    name: Run OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start Kraionyx Services (Docker Compose)
        run: |
          # In a real environment, we would spin up the services to scan them
          echo "Starting isolated test environment for penetration testing..."
          docker-compose -f docker-compose.yml up -d
          sleep 30

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:8000' # API Gateway target
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a' # Run active scan
          allow_issue_writing: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate DAST Report
        if: always()
        run: |
          echo "Automated DAST scan completed."
          echo "Report generated and available in job artifacts."
