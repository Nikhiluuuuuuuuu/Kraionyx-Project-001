syntax = "proto3";

package svaani.v1;

option go_package = "github.com/svaani/shared/gen/svaani/v1;svaaniv1";

// =============================================================================
// SpeakerSegment — A diarized and transcribed speech segment from a single
// speaker within the clinical encounter.
// =============================================================================
message SpeakerSegment {
  // Speaker role label assigned by diarization (e.g., "Doctor", "Patient")
  string speaker_label = 1;

  // Timestamps in seconds relative to session start
  double start_time = 2;
  double end_time = 3;

  // Transcribed text for this segment
  string text = 4;

  // ASR confidence score [0.0, 1.0]
  float confidence = 5;
}

// =============================================================================
// TranscriptionResult — Complete transcription output for a session.
// Produced to the "transcription.results" Kafka topic by the STT Engine.
// =============================================================================
message TranscriptionResult {
  string session_id = 1;

  // Ordered list of diarized speaker segments
  repeated SpeakerSegment segments = 2;

  // Full concatenated transcript text
  string full_transcript = 3;

  // Detected language code (ISO 639-1, e.g., "en")
  string language = 4;

  // Weighted average confidence across all segments
  float overall_confidence = 5;

  // Unix timestamp in milliseconds when processing completed
  int64 processed_at_ms = 6;
}

// =============================================================================
// SOAPNote — Structured clinical note in SOAP format.
// Generated by MedGemma from the diarized transcript.
// =============================================================================
message SOAPNote {
  string session_id = 1;

  // Subjective: patient's reported symptoms, history, chief complaint
  string subjective = 2;

  // Objective: clinician's observations, vitals, exam findings
  string objective = 3;

  // Assessment: diagnosis, differential, clinical reasoning
  string assessment = 4;

  // Plan: treatment, prescriptions, follow-up, referrals
  string plan = 5;

  // Additional structured metadata (e.g., ICD-10 codes, CPT codes)
  map<string, string> metadata = 6;

  // Model confidence score for the generated note [0.0, 1.0]
  float confidence_score = 7;

  // Unix timestamp in milliseconds when the note was generated
  int64 generated_at_ms = 8;
}

// =============================================================================
// ClinicalNote — The complete clinical documentation artifact.
// Produced to the "clinical.notes.created" Kafka topic by the Clinical NLP
// service. Consumed by the FHIR Adapter for EHR integration.
// =============================================================================
message ClinicalNote {
  string session_id = 1;

  // FHIR resource references
  string patient_id = 2;
  string practitioner_id = 3;
  string encounter_id = 4;

  // Structured SOAP note
  SOAPNote soap_note = 5;

  // Full transcript with PII redacted (PHI stripped)
  string redacted_transcript = 6;

  // Unix timestamp in milliseconds when the note was finalized
  int64 created_at_ms = 7;
}
